<nav class="text-white shadow-lg" style="background-color: #2C4C3B;">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-20">
      <!-- Logo/Título -->
      <div class="flex items-center space-x-3">
        <div class="w-10 h-10 rounded-lg flex items-center justify-center shadow-lg" style="background-color: #4A7C59;">
          <span class="text-white font-bold text-xl">P</span>
        </div>
        <h1 class="text-2xl font-bold text-white">Portal Internos</h1>
      </div>

      <!-- Enlaces de navegación (solo con sesión activa) -->
      @if (auth.isAuthenticated()) {
        <div class="hidden md:flex space-x-6">
          <a routerLink="/proyectos" routerLinkActive="text-white" class="px-4 py-2 rounded-lg text-white/80 hover:text-white hover:bg-white/10 transition-all duration-300 font-medium">Proyectos</a>
          <a routerLink="/tecnologias" routerLinkActive="text-white" class="px-4 py-2 rounded-lg text-white/80 hover:text-white hover:bg-white/10 transition-all duration-300 font-medium">Tecnologías</a>
          <a routerLink="/documentacion" routerLinkActive="text-white" class="px-4 py-2 rounded-lg text-white/80 hover:text-white hover:bg-white/10 transition-all duration-300 font-medium">Documentación</a>
          @if (auth.isAdmin()) {
            <a routerLink="/usuarios" routerLinkActive="text-white" class="px-4 py-2 rounded-lg text-white/80 hover:text-white hover:bg-white/10 transition-all duration-300 font-medium">Usuarios</a>
          }
        </div>

        <!-- Usuario actual + acciones -->
        <div class="flex items-center gap-3">
          <a routerLink="/cuenta" class="hidden sm:flex flex-col items-end leading-tight text-white/90 hover:text-white transition">
            <span class="text-sm font-semibold">{{ auth.currentUser()?.username }}</span>
            <span class="text-xs text-white/60">{{ auth.role() }}</span>
          </a>
          <button (click)="logout()" class="px-4 py-2 rounded-lg bg-white/10 hover:bg-white/20 text-white text-sm font-medium transition">
            Salir
          </button>
        </div>
      }
    </div>
  </div>
</nav>
