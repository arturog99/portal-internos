# Perfil "cert": HTTPS con TLS mutuo (mTLS) para login por certificado X.509 / FNMT.
# Arranque: mvnw spring-boot:run "-Dspring-boot.run.jvmArguments=-Dspring.profiles.active=cert"
# Certificados de PRUEBA (scripts/generate-demo-certs.ps1). En produccion: truststore FNMT.

server.port=8443

server.ssl.enabled=true
server.ssl.key-store=classpath:certs/server.p12
server.ssl.key-store-password=changeit
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=server

server.ssl.trust-store=classpath:certs/truststore.p12
server.ssl.trust-store-password=changeit
server.ssl.trust-store-type=PKCS12

server.ssl.client-auth=want

app.certificate.enabled=true
app.certificate.subject-regex=CN=(.*?)(?:,|$)

app.cors.allowed-origins=https://localhost:4200,http://localhost:4200