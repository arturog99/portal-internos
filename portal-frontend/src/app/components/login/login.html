<div class="min-h-screen flex items-center justify-center px-4" style="background-color: #F9F9F6;">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8 border border-gray-200">
    <!-- Cabecera -->
    <div class="flex flex-col items-center mb-8">
      <div class="w-14 h-14 rounded-xl flex items-center justify-center shadow-lg mb-3" style="background-color: #2C4C3B;">
        <span class="text-white font-bold text-2xl">P</span>
      </div>
      <h1 class="text-2xl font-bold" style="color: #1C211F;">Portal Internos</h1>
      <p class="text-sm mt-1" style="color: #1C211F; opacity: 0.6;">Accede con tus credenciales</p>
    </div>

    @if (error()) {
      <div class="mb-4 px-4 py-3 rounded-lg text-sm bg-red-50 text-red-700 border border-red-200">
        {{ error() }}
      </div>
    }

    <!-- Paso 1: credenciales -->
    @if (!twoFactorRequired()) {
      <form (ngSubmit)="submitLogin()" class="space-y-4">
        <div>
          <label class="block text-sm font-semibold mb-1" style="color: #1C211F;">Usuario</label>
          <input
            type="text"
            name="username"
            [ngModel]="username()"
            (ngModelChange)="username.set($event)"
            autocomplete="username"
            class="w-full px-4 py-3 rounded-lg bg-white border border-gray-300 focus:outline-none focus:ring-2 focus:border-transparent transition"
            style="color: #1C211F;"
            placeholder="admin"
          >
        </div>
        <div>
          <label class="block text-sm font-semibold mb-1" style="color: #1C211F;">Contraseña</label>
          <input
            type="password"
            name="password"
            [ngModel]="password()"
            (ngModelChange)="password.set($event)"
            autocomplete="current-password"
            class="w-full px-4 py-3 rounded-lg bg-white border border-gray-300 focus:outline-none focus:ring-2 focus:border-transparent transition"
            style="color: #1C211F;"
            placeholder="••••••••"
          >
        </div>
        <button
          type="submit"
          [disabled]="loading()"
          class="w-full py-3 rounded-lg text-white font-semibold transition disabled:opacity-60"
          style="background-color: #2C4C3B;"
        >
          {{ loading() ? 'Entrando...' : 'Iniciar sesión' }}
        </button>
      </form>
    }

    <!-- Paso 2: verificación 2FA -->
    @if (twoFactorRequired()) {
      <form (ngSubmit)="submitTwoFactor()" class="space-y-4">
        <p class="text-sm text-center" style="color: #1C211F; opacity: 0.7;">
          Introduce el código de 6 dígitos de Google Authenticator.
        </p>
        <input
          type="text"
          name="code"
          inputmode="numeric"
          maxlength="6"
          [ngModel]="code()"
          (ngModelChange)="code.set($event)"
          class="w-full px-4 py-3 rounded-lg bg-white border border-gray-300 focus:outline-none focus:ring-2 focus:border-transparent transition text-center text-2xl tracking-[0.5em]"
          style="color: #1C211F;"
          placeholder="000000"
        >
        <button
          type="submit"
          [disabled]="loading()"
          class="w-full py-3 rounded-lg text-white font-semibold transition disabled:opacity-60"
          style="background-color: #2C4C3B;"
        >
          {{ loading() ? 'Verificando...' : 'Verificar código' }}
        </button>
        <button
          type="button"
          (click)="cancelTwoFactor()"
          class="w-full py-2 rounded-lg font-medium border border-gray-300"
          style="color: #1C211F;"
        >
          Volver
        </button>
      </form>
    }
  </div>
</div>
