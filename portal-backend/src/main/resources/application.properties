spring.application.name=portal-backend

# ===== Servidor HTTPS con TLS mutuo (mTLS) =====
# Un unico puerto HTTPS sirve los tres metodos de acceso:
# usuario/clave, doble factor (TOTP) y certificado digital (X.509).
server.port=8443
server.ssl.enabled=true
server.ssl.key-store=classpath:certs/server.p12
server.ssl.key-store-password=changeit
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=server
# Truststore: CA que valida los certificados de cliente
server.ssl.trust-store=classpath:certs/truststore.p12
server.ssl.trust-store-password=changeit
server.ssl.trust-store-type=PKCS12
# "want" = pide el certificado pero NO lo obliga (asi sigue el login usuario/clave)
server.ssl.client-auth=want

# ===== MySQL =====
# Cambia DB_USERNAME / DB_PASSWORD por tus credenciales (o usa variables de entorno).
spring.datasource.url=jdbc:mysql://localhost:3306/portal_internos?createDatabaseIfNotExist=true&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===== JWT =====
# Secreto Base64 (cambialo en produccion). Minimo 256 bits para HS256.
app.jwt.secret=${JWT_SECRET:Y2FtYmlhLWVzdGUtc2VjcmV0by1wb3ItdW5vLW11eS1sYXJnby15LXNlZ3Vyby1lbi1wcm9kdWNjaW9uLTEyMzQ1Njc4OTA=}
app.jwt.expiration-ms=3600000
# Token temporal entre login y verificacion 2FA (5 min)
app.jwt.twofa-expiration-ms=300000

# ===== CORS (frontend Angular) =====
app.cors.allowed-origins=http://localhost:4200

# ===== Certificado digital (FNMT / X.509) =====
app.certificate.enabled=true
# Por defecto extrae el Common Name (CN). Para FNMT (DNI en SERIALNUMBER): SERIALNUMBER=([^,]+)
app.certificate.subject-regex=CN=(.*?)(?:,|$)

# ===== Seed de datos inicial =====
app.seed.enabled=true

# ===== Almacenamiento de documentos =====
# Directorio donde se guardan los archivos de avance (relativo al directorio de trabajo)
app.storage.documents-path=./documents

# ===== Multipart (subida de archivos) =====
# Tamaño máximo de archivo individual (10 MB)
spring.servlet.multipart.max-file-size=10MB
# Tamaño máximo total de petición (10 MB)
spring.servlet.multipart.max-request-size=10MB
