<div class="max-w-7xl mx-auto">
  <div class="text-center mb-12">
    <h1 class="text-5xl font-extrabold text-white mb-4">
      Tecnologías
    </h1>
    <p class="text-slate-300 text-lg">Todas las tecnologías utilizadas en nuestros proyectos</p>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    @for (tech of technologies(); track tech.name) {
      <div class="group bg-white/5 backdrop-blur-xl rounded-3xl p-6 border border-white/10 hover:border-red-500/50 transition-all duration-500 hover:transform hover:scale-105 hover:shadow-2xl hover:shadow-red-500/20">
        <div class="flex items-center justify-between mb-4">
          <h3 class="text-2xl font-bold text-white group-hover:text-red-300 transition-colors duration-300">{{ tech.name }}</h3>
          <span class="text-3xl font-bold text-red-400">{{ tech.count }}</span>
        </div>
        <p class="text-red-200/70 text-sm">Proyectos que utilizan esta tecnología</p>
      </div>
    }
  </div>
</div>
