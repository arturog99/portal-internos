<div class="mb-8">
  <input 
    type="text" 
    [(ngModel)]="searchTerm" 
    placeholder="Buscar proyecto por nombre..." 
    class="w-full md:w-1/2 px-4 py-3 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm transition"
  >
</div>

<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
  
  @for (proyecto of filteredProjects; track proyecto.id) {
    
    <div class="bg-white p-5 rounded-xl shadow-md border border-slate-200 hover:shadow-lg transition">
      <h3 class="text-xl font-bold text-slate-800">{{ proyecto.name }}</h3>
      <p class="text-slate-600 mt-2 text-sm">{{ proyecto.description }}</p>
      
      <div class="mt-3 flex flex-wrap gap-2">
        @for (tag of proyecto.tags; track tag) {
          <span class="text-xs bg-slate-100 text-slate-700 px-2 py-1 rounded-md">{{ tag }}</span>
        }
      </div>
      
      <div class="mt-4">
        <span class="text-xs font-semibold px-2 py-1 rounded-md"
              [ngClass]="{
                'bg-green-100 text-green-800': proyecto.status === 'Producción',
                'bg-yellow-100 text-yellow-800': proyecto.status === 'En Desarrollo',
                'bg-gray-100 text-gray-800': proyecto.status === 'Mantenimiento'
              }">
          {{ proyecto.status }}
        </span>
      </div>
    </div>
    
  } @empty {
    <div class="col-span-full text-center py-10 text-slate-500">
      No se han encontrado proyectos.
    </div>
  }
  
</div>
